<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>绻佹槦-瑙嗛鍒嗘瀽</title>
<style>
  /* 鈹€鈹€ Reset & Base 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  :root {
    --bg: #07090f;
    --surface: #0d1220;
    --card: #111827;
    --card2: #162035;
    --border: #1e2d45;
    --border2: #2a3f60;
    --text: #e8eef8;
    --text2: #8899b4;
    --text3: #4a5c78;
    --gold: #e8b84b;
    --gold2: #f0c97a;
    --gold-glow: rgba(232,184,75,0.18);
    --gold-glow2: rgba(232,184,75,0.08);
    --blue: #4a9eff;
    --green: #34d399;
    --yellow: #fbbf24;
    --red: #f87171;
    --purple: #a78bfa;
    --radius: 16px;
    --radius-sm: 10px;
    --transition: 0.25s ease;
  }
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    line-height: 1.6;
  }

  /* Starfield background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,184,75,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 40% at 80% 80%, rgba(74,158,255,0.04) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 30% 45%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 20%, rgba(232,184,75,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 75% 60%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 20% 80%, rgba(232,184,75,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 70%, rgba(255,255,255,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 85%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 40% 55%, rgba(74,158,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 5% 50%, rgba(255,255,255,0.3) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  .wrap { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 28px 80px; }

  /* 鈹€鈹€ Header 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 28px 0 0;
    margin-bottom: 48px;
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon {
    width: 42px; height: 42px;
    background: linear-gradient(135deg, #e8b84b 0%, #c8943a 50%, #f0c97a 100%);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
    box-shadow: 0 4px 20px rgba(232,184,75,0.35), 0 0 40px rgba(232,184,75,0.12);
    position: relative;
  }
  .logo-icon::after {
    content: '';
    position: absolute;
    inset: -2px;
    border-radius: 14px;
    background: linear-gradient(135deg, rgba(232,184,75,0.4), transparent);
    z-index: -1;
  }
  .logo-name { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
  .logo-name em { color: var(--gold); font-style: normal; }
  .logo-sub { font-size: 12px; color: var(--text3); margin-top: 1px; font-weight: 400; }
  .hdr-right { display: flex; align-items: center; gap: 10px; }
  .hdr-btn {
    width: 38px; height: 38px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    cursor: pointer;
    color: var(--text2);
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: var(--transition);
  }
  .hdr-btn:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-glow2); }
  .server-badge {
    font-size: 11px;
    padding: 5px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    color: var(--text3);
    background: var(--surface);
    font-family: 'SF Mono', 'Fira Code', monospace;
    display: flex; align-items: center; gap: 6px;
  }
  .server-badge .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text3); }
  .server-badge.connected { border-color: rgba(52,211,153,0.3); color: var(--green); }
  .server-badge.connected .dot { background: var(--green); box-shadow: 0 0 6px var(--green); }

  /* 鈹€鈹€ Settings Panel 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .settings {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 36px;
    overflow: hidden;
    display: none;
  }
  .settings.open { display: block; }
  .settings-header {
    padding: 20px 24px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; justify-content: space-between;
  }
  .settings-header h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
  .settings-body { padding: 24px; }

  .template-section { margin-bottom: 24px; }
  .template-label { font-size: 12px; color: var(--text2); margin-bottom: 10px; font-weight: 500; letter-spacing: 0.5px; }
  .template-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 12px; }
  .template-item {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 16px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: var(--transition);
    font-size: 13px;
  }
  .template-item:hover { border-color: var(--border2); background: var(--card2); }
  .template-item.active { border-color: var(--gold); background: var(--gold-glow2); color: var(--gold); }
  .template-item .t-name { flex: 1; font-weight: 500; }
  .template-item .t-check { font-size: 16px; opacity: 0; transition: var(--transition); }
  .template-item.active .t-check { opacity: 1; }
  .template-item .t-del { color: var(--text3); font-size: 14px; padding: 2px 6px; border-radius: 4px; transition: var(--transition); }
  .template-item .t-del:hover { color: var(--red); background: rgba(248,113,113,0.1); }

  .template-add { display: flex; gap: 10px; align-items: flex-end; }
  .template-add .form-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .form-input {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    color: var(--text);
    font-size: 13px;
    outline: none;
    transition: var(--transition);
    width: 100%;
    font-family: inherit;
  }
  .form-input:focus { border-color: var(--gold); background: var(--card2); }
  .form-input::placeholder { color: var(--text3); }
  textarea.form-input { resize: vertical; min-height: 72px; line-height: 1.6; }
  .btn {
    padding: 10px 20px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: var(--transition);
    border: none;
    font-family: inherit;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--gold), #c8943a);
    color: #1a0e00;
    box-shadow: 0 4px 14px rgba(232,184,75,0.3);
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,184,75,0.45); }
  .btn-ghost {
    background: transparent;
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

  .settings-footer {
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: center;
  }
  .server-config { display: flex; gap: 10px; flex: 1; }
  .server-config .form-group { flex: 1; display: flex; flex-direction: column; gap: 6px; }
  .form-hint { font-size: 11px; color: var(--text3); }
  .form-hint a { color: var(--blue); text-decoration: none; }

  /* 鈹€鈹€ Upload Section 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .upload-zone {
    border: 1.5px dashed var(--border2);
    border-radius: var(--radius);
    padding: 72px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s ease;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }
  .upload-zone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at center, rgba(232,184,75,0.07) 0%, transparent 65%);
    opacity: 0;
    transition: opacity 0.3s;
  }
  .upload-zone:hover, .upload-zone.drag {
    border-color: var(--gold);
    background: var(--card2);
  }
  .upload-zone:hover::before, .upload-zone.drag::before { opacity: 1; }
  .upload-icon {
    font-size: 52px;
    margin-bottom: 18px;
    filter: drop-shadow(0 4px 16px rgba(232,184,75,0.4));
    display: block;
  }
  .upload-title { font-size: 20px; font-weight: 600; margin-bottom: 8px; }
  .upload-sub { font-size: 14px; color: var(--text2); margin-bottom: 28px; }
  .upload-btn {
    display: inline-flex; align-items: center; gap: 8px;
    background: linear-gradient(135deg, var(--gold), #c8943a);
    color: #1a0e00;
    border: none;
    padding: 13px 30px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
    box-shadow: 0 4px 18px rgba(232,184,75,0.35);
  }
  .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,184,75,0.5); }
  .upload-hint { margin-top: 16px; font-size: 12px; color: var(--text3); font-family: 'SF Mono', monospace; }
  #fileInput { display: none; }

  /* 鈹€鈹€ Video Preview 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .preview { display: none; margin-bottom: 36px; }
  .preview.show { display: block; }
  .preview-grid { display: grid; grid-template-columns: 420px 1fr; gap: 20px; align-items: start; }
  .video-box { background: #000; border-radius: 14px; overflow: hidden; border: 1px solid var(--border); }
  .video-box video { width: 100%; display: block; max-height: 300px; object-fit: contain; }
  .meta-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
  }
  .meta-title { font-size: 13px; color: var(--text2); margin-bottom: 18px; font-weight: 600; letter-spacing: 0.5px; }
  .meta-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
  .meta-row:last-of-type { border-bottom: none; }
  .meta-key { color: var(--text3); font-family: 'SF Mono', monospace; font-size: 11px; }
  .meta-val { color: var(--text); font-weight: 500; }
  .start-btn {
    width: 100%; margin-top: 20px;
    background: linear-gradient(135deg, var(--gold), #c8943a);
    color: #1a0e00;
    border: none;
    padding: 14px;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: var(--transition);
    font-family: inherit;
    box-shadow: 0 4px 20px rgba(232,184,75,0.3);
    letter-spacing: 0.5px;
  }
  .start-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(232,184,75,0.5); }

  /* 鈹€鈹€ Analysis Loading 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .analysis { display: none; margin-bottom: 36px; }
  .analysis.show { display: block; }
  .analysis-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 36px;
    position: relative;
    overflow: hidden;
  }
  .analysis-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold2), var(--gold));
    background-size: 200% 100%;
    animation: shimmer 2.5s linear infinite;
  }
  @keyframes shimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }
  .analysis-top { display: flex; align-items: center; gap: 16px; margin-bottom: 28px; }
  .spinner {
    width: 42px; height: 42px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .analysis-title { font-size: 18px; font-weight: 600; }
  .analysis-sub { font-size: 13px; color: var(--text2); margin-top: 3px; }
  .steps { display: flex; flex-direction: column; gap: 10px; }
  .step {
    display: flex; align-items: center; gap: 12px;
    font-size: 13px; color: var(--text3);
    transition: color 0.3s;
  }
  .step.active { color: var(--text); }
  .step.done { color: var(--green); }
  .step-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--text3);
    flex-shrink: 0;
    transition: all 0.3s;
  }
  .step.active .step-dot { background: var(--gold); box-shadow: 0 0 8px var(--gold); animation: glow-pulse 1s ease-in-out infinite; }
  .step.done .step-dot { background: var(--green); box-shadow: 0 0 8px var(--green); }
  @keyframes glow-pulse { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.5);opacity:0.6} }
  .progress-track { margin-top: 24px; background: var(--border); border-radius: 4px; height: 4px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--gold), var(--gold2)); border-radius: 4px; width: 0%; transition: width 0.6s ease; }

  /* 鈹€鈹€ Results 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .results { display: none; margin-bottom: 36px; }
  .results.show { display: block; }
  .results-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
  }
  .results-title { font-size: 20px; font-weight: 700; }
  .btn-reset {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text2); padding: 8px 16px;
    border-radius: 8px; font-size: 13px; cursor: pointer;
    transition: var(--transition); font-family: inherit;
  }
  .btn-reset:hover { border-color: var(--border2); color: var(--text); }

  /* Risk Radar */
  .risk-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    margin-bottom: 20px;
  }
  .risk-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .risk-label { font-size: 14px; color: var(--text2); font-weight: 600; }
  .risk-badge {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }
  .risk-badge.low { background: rgba(52,211,153,0.12); color: var(--green); border: 1px solid rgba(52,211,153,0.25); }
  .risk-badge.mid { background: rgba(251,191,36,0.12); color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }
  .risk-badge.high { background: rgba(248,113,113,0.12); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
  .risk-meter-wrap { margin-bottom: 16px; }
  .risk-meter-track { background: var(--border); border-radius: 6px; height: 8px; overflow: hidden; }
  .risk-meter-fill { height: 100%; border-radius: 6px; transition: width 1.2s ease; }
  .risk-meter-fill.low { background: linear-gradient(90deg, #34d399, #059669); }
  .risk-meter-fill.mid { background: linear-gradient(90deg, #fbbf24, #d97706); }
  .risk-meter-fill.high { background: linear-gradient(90deg, #f87171, #dc2626); }
  .risk-factors { display: flex; flex-wrap: wrap; gap: 8px; }
  .risk-factor {
    padding: 6px 12px;
    background: rgba(248,113,113,0.08);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 6px;
    font-size: 12px;
    color: var(--red);
  }

  /* Visual Summary */
  .visual-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px; margin-bottom: 20px; }
  .visual-title { font-size: 14px; color: var(--text2); font-weight: 600; margin-bottom: 20px; }
  .visual-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .visual-item { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; }
  .visual-key { font-size: 11px; color: var(--text3); font-family: 'SF Mono', monospace; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .visual-val { font-size: 13px; color: var(--text); font-weight: 500; line-height: 1.5; }
  .visual-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .tag { padding: 3px 9px; background: var(--card2); border: 1px solid var(--border2); border-radius: 5px; font-size: 11px; color: var(--text2); }
  .tag.risk { background: rgba(248,113,113,0.08); border-color: rgba(248,113,113,0.2); color: var(--red); }

  /* 鈹€鈹€ Timeline 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€ */
  .timeline-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);

<script>
// 鈹€鈹€ State 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
const $ = id => document.getElementById(id);
let serverUrl = localStorage.getItem('star_server') ||
  (location.hostname !== 'localhost' && location.hostname !== '127.0.0.1' ? location.origin : 'http://localhost:3000');
let currentFile = null;
let lastResult = null;  // store for launch
let selectedStyle = '';
let selectedOpts = new Set();

let templates = JSON.parse(localStorage.getItem('star_templates') || 'null') || [
  {
    name: 'Seedance 2.0 鏍囧噯妯℃澘',
    template: `@鍥剧墖1浣滀负涓讳綋瑙掕壊锛孿n@瑙嗛1浣滀负闀滃ご璇█鍙傝€冿紝\n@闊抽1浣滀负鑳屾櫙闊充箰鍙傝€冿紝\n鍦▄scene}涓繘琛岃棰戝垱浣滐紝\n{visualStyle}瑙嗚椋庢牸锛寋colorTone}鑹茶皟锛寋mood}姘涘洿锛孿n{shotComposition}锛孿n{adTechnique}锛孿n鏍稿績鍗栫偣锛歿sellingPoints}锛孿n{BGM}鑳屾櫙闊充箰锛歿audioElements}`
  },
  {
    name: '鐢靛奖鎰熸ā鏉?,
    template: `闀滃ご锛歿shotComposition}锛孿n鍦烘櫙锛歿scene}锛孿n涓讳綋瑙掕壊锛欯鍥剧墖1锛孿n杩愰暅鍙傝€冿細@瑙嗛1锛孿n{BGM}閰嶄箰锛歿audioElements}锛孿n{visualStyle}锛寋colorTone}鑹茶皟锛孿n{mood}鎯呯华鍩鸿皟锛孿n鏍稿績鍗栫偣锛歿sellingPoints}锛孿n{adTechnique}锛孿n鍏夊奖锛歿lighting}锛屾瀯鍥撅細{composition}`
  }
];
let activeTemplate = localStorage.getItem('star_active_tpl') || templates[0].name;

// 鈹€鈹€ Init 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function init() {
  $('serverUrlInput').value = serverUrl;
  renderTemplates();
  bindEvents();
  testServer();
}

function renderTemplates() {
  $('templateList').innerHTML = templates.map(t => `
    <div class="template-item${t.name === activeTemplate ? ' active' : ''}" data-name="${esc(t.name)}">
      <span class="t-check">鉁?/span>
      <span class="t-name">${esc(t.name)}</span>
      <span class="t-del" data-del="${esc(t.name)}">鉁?/span>
    </div>
  `).join('');
}

function bindEvents() {
  // Settings
  $('settingsBtn').onclick = () => $('settingsPanel').classList.toggle('open');
  $('templateList').onclick = e => {
    const item = e.target.closest('.template-item');
    const del = e.target.closest('.t-del');
    if (del) {
      const name = del.dataset.del;
      templates = templates.filter(t => t.name !== name);
      if (activeTemplate === name) { activeTemplate = templates[0]?.name || ''; saveTemplates(); }
      localStorage.setItem('star_templates', JSON.stringify(templates));
      renderTemplates();
      return;
    }
    if (item) { activeTemplate = item.dataset.name; localStorage.setItem('star_active_tpl', activeTemplate); renderTemplates(); }
  };
  $('addTplBtn').onclick = () => {
    const name = $('tplNameInput').value.trim();
    const content = $('tplContentInput').value.trim();
    if (!name || !content) { showToast('鈿狅笍 璇峰～鍐欏悕绉板拰妯℃澘鍐呭'); return; }
    if (templates.find(t => t.name === name)) { showToast('鈿狅笍 璇ュ悕绉板凡瀛樺湪'); return; }
    templates.push({ name, template: content });
    activeTemplate = name;
    saveTemplates();
    renderTemplates();
    $('tplNameInput').value = '';
    $('tplContentInput').value = '';
    showToast('鉁?妯℃澘宸叉坊鍔?);
  };
  $('testBtn').onclick = testServer;
  $('saveBtn').onclick = () => {
    serverUrl = $('serverUrlInput').value.trim() || 'http://localhost:3000';
    localStorage.setItem('star_server', serverUrl);
    showToast('鉁?璁剧疆宸蹭繚瀛?);
    testServer();
    $('settingsPanel').classList.remove('open');
  };

  // Upload
  $('uploadZone').onclick = () => $('fileInput').click();
  $('fileInput').onchange = e => handleFile(e.target.files[0]);
  $('uploadZone').ondragover = e => { e.preventDefault(); $('uploadZone').classList.add('drag'); };
  $('uploadZone').ondragleave = () => $('uploadZone').classList.remove('drag');
  $('uploadZone').ondrop = e => { e.preventDefault(); $('uploadZone').classList.remove('drag'); handleFile(e.dataTransfer.files[0]); };

  // Start & Reset
  $('startBtn').onclick = startAnalysis;
  $('resetBtn').onclick = resetAll;

  // Copy & Export
  $('copyBtn').onclick = () => copyText($('promptText').textContent);
  $('exportBtn').onclick = () => exportText($('promptText').textContent, 'seedance-prompt.txt');

  // Launch Panel
  $('launchBtn').onclick = () => { if (lastResult) $('launchOverlay').classList.add('show'); };
  $('launchClose').onclick = () => $('launchOverlay').classList.remove('show');
  $('launchOverlay').onclick = e => { if (e.target === $('launchOverlay')) $('launchOverlay').classList.remove('show'); };

  // Style selection (radio)
  $('styleGrid').onclick = e => {
    const opt = e.target.closest('.style-option');
    if (!opt) return;
    document.querySelectorAll('.style-option').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    selectedStyle = opt.dataset.style;
  };

  // Optimize selection (checkbox)
  $('optGrid').onclick = e => {
    const opt = e.target.closest('.opt-option');
    if (!opt) return;
    const val = opt.dataset.opt;
    if (selectedOpts.has(val)) { selectedOpts.delete(val); opt.classList.remove('selected'); }
    else { selectedOpts.add(val); opt.classList.add('selected'); }
  };

  // Fire!
  $('launchFireBtn').onclick = fireLaunch;

  // Launch result copy/export
  $('lrCopyBtn').onclick = () => copyText($('lrText').textContent);
  $('lrExportBtn').onclick = () => exportText($('lrText').textContent, 'seedance-prompt-new.txt');
}

function saveTemplates() {
  localStorage.setItem('star_templates', JSON.stringify(templates));
  localStorage.setItem('star_active_tpl', activeTemplate);
}

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => showToast('鉁?宸插鍒跺埌鍓创鏉?));
}

function exportText(text, filename) {
  const blob = new Blob([text], { type: 'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  a.click(); URL.revokeObjectURL(url);
  showToast('鉁?宸蹭繚瀛樺埌鏈湴');
}

// 鈹€鈹€ Server 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
async function testServer() {
  const badge = $('serverBadge');
  const text = $('serverText');
  badge.className = 'server-badge';
  text.textContent = '杩炴帴涓?..';
  try {
    const res = await fetch(`${serverUrl}/health`, { signal: AbortSignal.timeout(5000) });
    if (res.ok) {
      const d = await res.json();
      badge.className = 'server-badge connected';
      text.textContent = d.version || '宸茶繛鎺?;
    } else { throw new Error(); }
  } catch {
    badge.className = 'server-badge';
    text.textContent = '鏈繛鎺?;
  }
}

// 鈹€鈹€ File 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function handleFile(file) {
  if (!file || !file.type.startsWith('video/')) { showToast('鈿狅笍 璇烽€夋嫨瑙嗛鏂囦欢'); return; }
  if (file.size > 200 * 1024 * 1024) { showToast('鈿狅笍 鏂囦欢瓒呰繃 200MB'); return; }
  currentFile = file;
  const url = URL.createObjectURL(file);
  const video = $('videoEl');
  video.src = url;
  video.onloadedmetadata = () => {
    $('mName').textContent = file.name;
    $('mFmt').textContent = file.type.split('/')[1].toUpperCase();
    $('mSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
    $('mDur').textContent = fmtTime(video.duration);
    $('mRes').textContent = video.videoWidth + '脳' + video.videoHeight;
    $('uploadZone').style.display = 'none';
    $('previewSection').classList.add('show');
  };
}

function fmtTime(s) {
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// 鈹€鈹€ Analysis 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
async function startAnalysis() {
  if (!currentFile) return;

  $('previewSection').classList.remove('show');
  $('resultsSection').classList.remove('show');
  $('analysisSection').classList.add('show');

  const steps = [
    { id: 's1', t: '涓婁紶瑙嗛鏂囦欢...', s: '姝ｅ湪浼犺緭', d: 0 },
    { id: 's2', t: '瑙嗚鍐呭鍒嗘瀽 + 鏃堕棿杞?..', s: 'Gemini 鐞嗚В瑙嗛', d: 2000 },
    { id: 's3', t: '鐢熸垚鏃堕棿杞存彁绀鸿瘝...', s: '鎸夎妭鐐圭敓鎴?, d: 8000 },
    { id: 's4', t: '鑸嗘儏椋庨櫓璇勪及...', s: '鍒嗘瀽椋庨櫓鍥犵礌', d: 14000 },
    { id: 's5', t: '杈撳嚭鎶ュ憡...', s: '鍗冲皢瀹屾垚', d: 18000 }
  ];

  steps.forEach((step, i) => {
    setTimeout(() => {
      if (i > 0) { $(steps[i-1].id).classList.remove('active'); $(steps[i-1].id).classList.add('done'); }
      $(step.id).classList.add('active');
      $('aTitle').textContent = step.t;
      $('aSub').textContent = step.s;
      $('progressFill').style.width = ((i + 1) / steps.length * 100) + '%';
    }, step.d);
  });

  try {
    const formData = new FormData();
    formData.append('video', currentFile);
    const activeTpl = templates.find(t => t.name === activeTemplate);
    if (activeTpl) formData.append('promptTemplate', JSON.stringify(activeTpl));

    const res = await fetch(`${serverUrl}/api/analyze`, {
      method: 'POST',
      body: formData,
      signal: AbortSignal.timeout(180000)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const result = await res.json();
    const data = result.data;
    lastResult = data;

    setTimeout(() => {
      $('s5').classList.remove('active'); $('s5').classList.add('done');
      $('progressFill').style.width = '100%';
      $('aTitle').textContent = '鍒嗘瀽瀹屾垚';
      $('aSub').textContent = `鑰楁椂 ${result.elapsed} 绉抈;
      setTimeout(() => { $('analysisSection').classList.remove('show'); showResults(data); }, 600);
    }, 20000);

  } catch (err) {
    console.error(err);
    $('aTitle').textContent = '鍒嗘瀽澶辫触';
    $('aSub').textContent = err.message;
    setTimeout(() => { $('analysisSection').classList.remove('show'); $('previewSection').classList.add('show'); }, 3000);
    showToast('鉂?' + err.message);
  }
}

// 鈹€鈹€ Results 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
function showResults(data) {
  $('resultsSection').classList.add('show');
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Risk
  const risk = data.riskAssessment || { overall: '鏈煡', score: 50, factors: [] };
  const riskLevel = risk.overall === '楂橀闄? ? 'high' : risk.overall === '涓闄? ? 'mid' : 'low';
  const badge = $('riskBadge');
  badge.className = 'risk-badge ' + riskLevel;
  badge.textContent = risk.overall || '鏈煡';
  const fill = $('riskFill');
  fill.className = 'risk-meter-fill ' + riskLevel;
  setTimeout(() => { fill.style.width = (risk.score || 50) + '%'; }, 100);
  $('riskFactors').innerHTML = (risk.factors || []).map(f => `<div class="risk-factor">鈿狅笍 ${esc(f)}</div>`).join('') || '<div style="font-size:13px;color:var(--text3)">鏃犳槑鏄鹃闄╁洜绱?/div>';

  // Visual
  const v = data.visual || {};
  $('vProduct').textContent = v.product || '-';
  $('vCategory').textContent = v.category || '-';
  $('vMood').textContent = v.mood || '-';
  $('vQuality').textContent = v.videoQuality || '-';
  $('vStyle').textContent = v.visualStyle || '-';
  $('vAudience').textContent = v.targetAudience || '-';
  $('vSellingPoints').innerHTML = (v.sellingPoints || []).map(s => `<span class="tag">${esc(s)}</span>`).join('') || '-';
  $('vRiskPoints').innerHTML = (v.controversialElements || []).map(s => `<span class="tag risk">${esc(s)}</span>`).join('') || '<span class="tag">鏃?/span>';

  // Timeline
  const timeline = data.timeline || [];
  const timelinePrompts = data.timelinePrompts || [];
  $('timelineList').innerHTML = timeline.map((t, i) => {
    const prompt = timelinePrompts.find(p => p.timeRange === t.timeRange);
    return `
      <div class="timeline-node">
        <div class="timeline-time">${esc(t.timeRange)}</div>
        <div class="timeline-content">
          <div class="tc-row"><span class="tc-label">鐢婚潰</span><span class="tc-val">${esc(t.visual)}</span></div>
          ${t.dialogue ? `<div class="tc-row"><span class="tc-label">鍙拌瘝</span><span class="tc-val dialogue">"${esc(t.dialogue)}"</span></div>` : ''}
          <div class="tc-row"><span class="tc-label">鍔ㄤ綔</span><span class="tc-val">${esc(t.action)}</span></div>
          <div class="tc-row"><span class="tc-label">闀滃ご</span><span class="tc-val">${esc(t.camera)}</span></div>
          <div class="tc-row"><span class="tc-label">鎯呯华</span><span class="tc-val">${esc(t.emotion)}</span></div>
          ${prompt ? `<div class="tc-prompt">鉁?${esc(prompt.prompt)}</div>` : ''}
        </div>
      </div>
    `;
  }).join('') || '<div style="font-size:13px;color:var(--text3);padding:8px">鏃犳椂闂磋酱鏁版嵁</div>';

  // Seedance Prompt
  $('promptText').textContent = data.seedancePrompt || '-';
  $('promptTplName').textContent = activeTemplate;

  // Breakdown
  const bd = data.promptBreakdown || {};
  const breakdownKeys = ['涓讳綋', '鍦烘櫙', '鍔ㄤ綔', '椋庢牸', '鑹茶皟', '杩愰暅', '闊充箰'];
  const breakdownVals = [bd['涓讳綋'], bd['鍦烘櫙'], bd['鍔ㄤ綔'], bd['椋庢牸'], bd['鑹茶皟'], bd['杩愰暅'], bd['闊充箰']];
  $('breakdownGrid').innerHTML = breakdownKeys.map((k, i) => `
    <div class="breakdown-item">
      <div class="breakdown-key">${k}</div>
      <div class="breakdown-val">${esc(breakdownVals[i] || '-')}</div>
    </div>
  `).join('');

  // Suggestions
  $('suggestionsList').innerHTML = (data.suggestions || []).map(s => `
    <div class="suggestion-item">
      <span class="suggestion-icon">馃挕</span>
      <span>${esc(s)}</span>
    </div>
  `).join('') || '<div style="font-size:13px;color:var(--text3);padding:4px">鏆傛棤寤鸿</div>';
}

// 鈹€鈹€ Launch (Stage 3) 鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€鈹€
async function fireLaunch() {
  if (!selectedStyle) { showToast('鈿狅笍 璇峰厛閫夋嫨鐢婚'); return; }
  if (!lastResult) { showToast('鈿狅笍 鏃犲垎鏋愭暟鎹?); return; }

  const btn = $('launchFireBtn');
  btn.disabled = true;
  btn.textContent = '馃敟 姝ｅ湪鐢熸垚...';
  $('launchResult').classList.remove('show');

  try {
    const activeTpl = templates.find(t => t.name === activeTemplate);
    const res = await fetch(`${serverUrl}/api/launch`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        visualData: lastResult.visual,
        timeline: lastResult.timeline,
        originalPrompt: lastResult.seedancePrompt,
        artStyle: selectedStyle,
        optimizeDirections: Array.from(selectedOpts),
        userTemplate: activeTpl || null
      }),
      signal: AbortSignal.timeout(120000)
    });

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || `HTTP ${res.status}`);
    }

    const result = await res.json();
    showLaunchResult(result.data);

  } catch (err) {
    showToast('鉂?鍙戝皠澶辫触: ' + err.message);
  } finally {
    btn.disabled = false;
    btn.textContent = '馃敟 鍙戝皠鏂版彁绀鸿瘝';
  }
}

function showLaunchResult(data) {
  $('launchResult').classList.add('show');
  $('lrBadge').textContent = `馃帹 ${data.artStyle || selectedStyle}`;
  $('lrText').textContent = data.seedancePrompt || '-';
  $('lrChanges').textContent = data.changesSummary ? `馃搵 鍙樺寲鎽樿锛?{data.changesSummary}` : '';

  // Timeline prompts
  const tp = data.timelinePrompts || [];
  $('lrTimeline').innerHTML = tp.length > 0 ? tp.map(p => `
    <div class="lr-timeline-node">
      <div class="lr-tn-time">${esc(p.timeRange)}</div>
      <div class="lr-tn-prompt">${esc(p.prompt)}</div>
    </div>
  `).join('') : '';
}

function resetAll() {
  currentFile = null;
  lastResult = null;
  selectedStyle = '';
  selectedOpts.clear();
  document.querySelectorAll('.style-option').forEach(o => o.classList.remove('selected'));
  document.querySelectorAll('.opt-option').forEach(o => o.classList.remove('selected'));
  $('videoEl').src = '';
  $('fileInput').value = '';
  $('uploadZone').style.display = '';
  $('previewSection').classList.remove('show');
  $('resultsSection').classList.remove('show');
  $('analysisSection').classList.remove('show');
  $('launchOverlay').classList.remove('show');
  $('launchResult').classList.remove('show');
  document.querySelectorAll('.step').forEach(el => el.classList.remove('active','done'));
  $('progressFill').style.width = '0%';
  $('riskFill').style.width = '0%';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showToast(msg) {
  const icon = msg.match(/^[^\s]+/)?.[0] || '鈩癸笍';
  $('tIcon').textContent = icon;
  $('tText').textContent = msg;
  $('toast').classList.add('show');
  setTimeout(() => $('toast').classList.remove('show'), 4000);
}

init();
</script>
